apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: prod
  labels:
    app: postgres

spec:
  serviceName: "postgres"
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres

          ports:
            - containerPort: 5432

          envFrom:
            - configMapRef:
                name: task-config

          env:
            - name: POSTGRES_PASSWORD
              value: "4015"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  namespace: prod
  name: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
