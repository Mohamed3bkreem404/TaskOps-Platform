services:
  app:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "9000:9000"
    depends_on:
      - postgres

  postgres:
    image: postgres
    container_name: taskDB
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4015
      POSTGRES_DB: taskdb
    volumes:
      - postgres-data:/var/lib/postgresql
volumes:
  postgres-data: